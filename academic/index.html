<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>学术情报归档 — Rookie's News</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=2">
  <style>
    .archive-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }
    .archive-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      transition: all 0.2s;
      text-decoration: none;
    }
    .archive-item:hover {
      border-color: var(--accent-academic);
      transform: translateX(4px);
    }
    .archive-date {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 90px;
    }
    .archive-period {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(9, 105, 218, 0.1);
      color: var(--accent-academic);
      white-space: nowrap;
    }
    .archive-keywords {
      flex: 1;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .archive-arrow {
      color: var(--text-muted);
      font-size: 1rem;
    }
    .archive-group {
      margin-bottom: 24px;
    }
    .archive-group-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border-color);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>📚 学术情报归档</h1>
      <p class="subtitle">Heimdall · AI/ML 论文 · GitHub Trending · HackerNews</p>
    </div>
  </header>

  <main class="container">
    <p style="margin: 24px 0;"><a href="../index.html">← 返回看板</a></p>
    <div id="report-list">
      <div class="loading">加载中...</div>
    </div>
  </main>

  <footer class="report-footer">
    <div class="container">
      <p><a href="../index.html">← 返回看板</a></p>
    </div>
  </footer>

  <script>
    async function load() {
      try {
        const manifest = await fetch('../data/manifest.json').then(r => r.json());
        const reports = manifest.academic || [];
        const grouped = {};
        reports.forEach(r => {
          if (!grouped[r.date]) grouped[r.date] = [];
          grouped[r.date].push(r);
        });

        const periodLabel = p => {
          const map = {morning: '晨间', noon: '午间', evening: '晚间'};
          return map[p] || p;
        };

        const html = Object.entries(grouped).sort((a, b) => b[0].localeCompare(a[0])).map(([date, items]) => {
          const links = items.map(r => {
            const relPath = r.path.replace(/^academic\//, '');
            const kw = (r.keywords || []).slice(0, 3).join(' · ');
            return `
              <a class="archive-item" href="${relPath}">
                <span class="archive-date">${date}</span>
                <span class="archive-period">${periodLabel(r.period)}</span>
                <span class="archive-keywords" title="${kw}">${kw || '学术日报'}</span>
                <span class="archive-arrow">→</span>
              </a>
            `;
          }).join('');
          return `
            <div class="archive-group">
              <div class="archive-group-title">${date}</div>
              <div class="archive-list">${links}</div>
            </div>
          `;
        }).join('');

        document.getElementById('report-list').innerHTML = html || '<div class="empty-state">暂无报告</div>';
      } catch (e) {
        document.getElementById('report-list').innerHTML = '<div class="empty-state">加载失败</div>';
      }
    }
    load();
  </script>
</body>
</html>
