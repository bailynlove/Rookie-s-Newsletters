<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Rookie's News — 学术情报 · 宏观金融</title>
  <link rel="stylesheet" href="assets/css/main.css?v=2">
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>

  <header class="site-header">
    <div class="container">
      <h1>👁️ Rookie's News</h1>
      <p class="subtitle">学术情报流 · 宏观金融看板</p>
    </div>
  </header>

  <main class="container">
    <!-- Tabs -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="academic">📚 学术情报</button>
      <button class="tab-btn finance-tab" data-tab="finance">💹 宏观金融</button>
    </div>

    <!-- Academic Panel -->
    <div class="tab-panel active" id="academic-panel">
      <div id="academic-content">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <!-- Finance Panel -->
    <div class="tab-panel" id="finance-panel">
      <div id="finance-content">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </main>

  <footer class="report-footer">
    <div class="container">
      <p>Rookie's News · Generated by Heimdall & Friday · Hosted on GitHub Pages</p>
    </div>
  </footer>

  <script>
    // === Theme Toggle ===
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
    });

    // === Tab Switching ===
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
      });
    });

    // === Utilities ===
    const formatDate = (str) => {
      const d = new Date(str);
      return `${d.getMonth()+1}月${d.getDate()}日`;
    };

    const periodLabel = (p) => {
      const map = {
        morning: '晨间简报', noon: '午间论文', evening: '晚间趋势',
        'a-close': '收盘分析', 'us-premarket': '美股盘前'
      };
      return map[p] || p;
    };

    // === SVG Line Chart ===
    function renderLineChart(containerId, series, labels, colors) {
      const container = document.getElementById(containerId);
      if (!container || !series.length) return;

      const width = 800;
      const height = 180;
      const padding = { top: 10, right: 10, bottom: 30, left: 40 };
      const chartW = width - padding.left - padding.right;
      const chartH = height - padding.top - padding.bottom;

      const allValues = series.flat();
      const minVal = Math.min(...allValues) * 0.95;
      const maxVal = Math.max(...allValues) * 1.05;
      const range = maxVal - minVal || 1;

      const xScale = (i) => padding.left + (i / (series[0].length - 1)) * chartW;
      const yScale = (v) => padding.top + chartH - ((v - minVal) / range) * chartH;

      let svg = `<svg class="line-chart-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">`;

      // Grid lines
      for (let i = 0; i <= 4; i++) {
        const y = padding.top + (chartH / 4) * i;
        const val = maxVal - (range / 4) * i;
        svg += `<line class="grid-line" x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}"/>`;
        svg += `<text class="axis-text" x="${padding.left - 5}" y="${y + 3}" text-anchor="end">${val.toFixed(1)}</text>`;
      }

      // X axis labels
      const step = Math.ceil(labels.length / 7);
      labels.forEach((label, i) => {
        if (i % step === 0 || i === labels.length - 1) {
          svg += `<text class="axis-text" x="${xScale(i)}" y="${height - 8}" text-anchor="middle">${formatDate(label)}</text>`;
        }
      });

      series.forEach((data, sIdx) => {
        const color = colors[sIdx];
        // Area
        let areaPath = `M ${xScale(0)} ${yScale(data[0])}`;
        data.forEach((v, i) => { areaPath += ` L ${xScale(i)} ${yScale(v)}`; });
        areaPath += ` L ${xScale(data.length - 1)} ${height - padding.bottom} L ${xScale(0)} ${height - padding.bottom} Z`;
        svg += `<path class="chart-area" d="${areaPath}" fill="${color}"/>`;

        // Line
        let linePath = `M ${xScale(0)} ${yScale(data[0])}`;
        data.forEach((v, i) => { if (i > 0) linePath += ` L ${xScale(i)} ${yScale(v)}`; });
        svg += `<path class="chart-line" d="${linePath}" stroke="${color}"/>`;

        // Dots
        data.forEach((v, i) => {
          svg += `<circle class="chart-dot" cx="${xScale(i)}" cy="${yScale(v)}" fill="${color}"/>`;
        });
      });

      svg += '</svg>';
      container.innerHTML = svg;
    }

    // === Word Cloud ===
    function renderWordCloud(containerId, items) {
      const container = document.getElementById(containerId);
      if (!container || !items.length) return;
      const maxCount = Math.max(...items.map(t => t.count));
      const html = items.map(t => {
        const ratio = t.count / maxCount;
        const sizeClass = ratio > 0.85 ? 'size-6' : ratio > 0.65 ? 'size-5' : ratio > 0.45 ? 'size-4' : ratio > 0.25 ? 'size-3' : ratio > 0.1 ? 'size-2' : 'size-1';
        return `<span class="word-cloud-item ${sizeClass}">${t.topic || t.subscription || t.category}</span>`;
      }).join('');
      container.innerHTML = `<div class="word-cloud">${html}</div>`;
    }

    // === Calendar Heatmap ===
    function renderCalendarHeatmap(containerId, data, type = 'academic') {
      const container = document.getElementById(containerId);
      if (!container || !data.length) return;
      const maxLevel = 4;
      const cells = data.map(d => `<div class="calendar-cell ${type}" data-level="${d.level}" title="${d.date}: ${d.intensity}"></div>`).join('');
      const legend = [0,1,2,3,4].map(l => `<div class="calendar-legend-item"><div class="calendar-legend-box calendar-cell ${type}" data-level="${l}"></div><span>${l === 0 ? '无' : l === 4 ? '高' : ''}</span></div>`).join('');
      container.innerHTML = `
        <div class="calendar-heatmap">${cells}</div>
        <div class="calendar-legend">${legend}</div>
      `;
    }

    // === Sparkline Array ===
    function renderSparklineArray(containerId, data) {
      const container = document.getElementById(containerId);
      if (!container || !data.length) return;
      const width = 300;
      const height = 28;
      const padding = 2;
      const chartW = width - padding * 2;
      const chartH = height - padding * 2;

      const html = data.map(item => {
        const values = item.series.map(s => s.value);
        const maxVal = Math.max(...values, 1);
        const points = item.series.map((s, i) => {
          const x = padding + (i / (item.series.length - 1 || 1)) * chartW;
          const y = padding + chartH - (s.value / maxVal) * chartH;
          return `${x},${y}`;
        }).join(' ');
        const total = values.reduce((a, b) => a + b, 0);
        return `
          <div class="sparkline-row">
            <span class="sparkline-label has-tooltip-left" data-tooltip="${item.topic}" tabindex="0">${item.topic}</span>
            <svg class="sparkline-mini" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
              <polyline points="${points}" fill="none" stroke="var(--accent-academic)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="sparkline-value">${total}</span>
          </div>
        `;
      }).join('');
      container.innerHTML = `<div class="sparkline-array">${html}</div>`;
    }

    // === UpSet Plot ===
    function renderUpSetPlot(containerId, data) {
      const container = document.getElementById(containerId);
      if (!container) return;
      if (!data.length) {
        container.innerHTML = '<p style="color:var(--text-muted);font-size:0.875rem;padding:16px;">暂无跨订阅共振数据。</p>';
        return;
      }
      const maxCount = Math.max(...data.map(d => d.count));
      if (maxCount <= 1) {
        container.innerHTML = '<p style="color:var(--text-muted);font-size:0.875rem;padding:16px;">数据积累中，跨订阅共振关系将在收集到更多报告后显示。</p>';
        return;
      }

      // Get all unique sources
      const allSources = [...new Set(data.flatMap(d => d.combination))];

      // Bars (top)
      const bars = data.map((d, i) => {
        const h = (d.count / maxCount * 100).toFixed(0);
        return `<div class="upset-bar" style="height:${h}%" title="${d.combination.join(' + ')}: ${d.count}"><span class="upset-bar-value">${d.count}</span></div>`;
      }).join('');

      // Dot matrix (bottom)
      const matrixRows = allSources.map(src => {
        const dots = data.map(d => {
          const isActive = d.combination.includes(src);
          return `<div class="upset-dot ${isActive ? 'active' : ''}"></div>`;
        }).join('');
        return `<div class="upset-matrix-row"><span class="upset-matrix-label">${src}</span><div class="upset-dots">${dots}</div></div>`;
      }).join('');

      container.innerHTML = `
        <div class="upset-combinations">${bars}</div>
        <div class="upset-matrix">${matrixRows}</div>
      `;
    }

    // === Grid Heatmap (Risk Matrix) ===
    function renderRiskMatrix(containerId, data) {
      const container = document.getElementById(containerId);
      if (!container) return;
      if (!data.length || !data[0].values.length || data[0].values.length < 3) {
        container.innerHTML = '<p style="color:var(--text-muted);font-size:0.875rem;padding:16px;">风险矩阵数据不足，需要至少 3 天数据才能生成有意义的矩阵。</p>';
        return;
      }

      const levelClass = (level) => {
        const map = { low: 'risk-level-low', 'low-mid': 'risk-level-low-mid', mid: 'risk-level-mid', 'high-mid': 'risk-level-high-mid', high: 'risk-level-high' };
        return map[level] || 'risk-level-unknown';
      };

      const dates = data[0].values.map(v => v.date);
      const gridStyle = `grid-template-columns: 100px repeat(${dates.length}, minmax(32px, 1fr));`;

      let cells = '';
      // Header row
      cells += `<div class="risk-matrix-header"><div class="risk-cell"></div>${dates.map(d => `<div class="risk-cell">${d.slice(5)}</div>`).join('')}</div>`;
      // Data rows
      data.forEach(row => {
        cells += `<div class="risk-cell" style="font-size:0.75rem;font-weight:600;color:var(--text-secondary);">${row.category}</div>`;
        row.values.forEach(v => {
          const label = v.level === 'high' ? '⚠' : '';
          cells += `<div class="risk-cell ${levelClass(v.level)}" title="${row.category} ${v.date}: ${v.level}">${label}</div>`;
        });
      });

      container.innerHTML = `<div class="risk-matrix-grid" style="${gridStyle}">${cells}</div>`;
    }

    // === Fetch Data ===
    async function loadData() {
      try {
        const [manifest, acTrends, finTrends] = await Promise.all([
          fetch('data/manifest.json').then(r => r.ok ? r.json() : null).catch(() => null),
          fetch('data/trends-academic.json').then(r => r.ok ? r.json() : null).catch(() => null),
          fetch('data/trends-finance.json').then(r => r.ok ? r.json() : null).catch(() => null),
        ]);
        renderAcademic(manifest, acTrends);
        renderFinance(manifest, finTrends);
      } catch (e) {
        console.error(e);
        document.getElementById('academic-content').innerHTML =
          '<div class="empty-state">数据加载失败，请稍后再试</div>';
        document.getElementById('finance-content').innerHTML =
          '<div class="empty-state">数据加载失败，请稍后再试</div>';
      }
    }

    // === Collapsible Updates ===
    function renderUpdatesList(reports, section, maxItems) {
      const items = reports.slice(0, maxItems);
      return items.map(r => `
        <div class="update-item ${section}">
          <a href="${r.path}">${periodLabel(r.period)}</a>
          <span class="update-date">${r.date}</span>
        </div>
      `).join('');
    }

    function createCollapsibleUpdates(id, title, reports, section) {
      return `
        <div class="mt-24">
          <button class="collapse-toggle" onclick="toggleCollapse('${id}')">
            <span class="chevron">▶</span>
            <span>${title}</span>
          </button>
          <div class="collapse-content" id="${id}">
            <div class="updates-grid" data-section="${section}">
              ${renderUpdatesList(reports, section, window.innerWidth < 768 ? 5 : 10)}
            </div>
          </div>
        </div>
      `;
    }

    window.switchTopicView = function(view) {
      document.getElementById('topic-view-bars').style.display = view === 'bars' ? 'block' : 'none';
      document.getElementById('topic-view-cloud').style.display = view === 'cloud' ? 'block' : 'none';
      document.querySelectorAll('.word-cloud-toggle button').forEach((btn, i) => {
        btn.classList.toggle('active', (view === 'bars' && i === 0) || (view === 'cloud' && i === 1));
      });
    };

    window.toggleCollapse = function(id) {
      const el = document.getElementById(id);
      const btn = el.previousElementSibling;
      el.classList.toggle('expanded');
      btn.classList.toggle('expanded');
      const chevron = btn.querySelector('.chevron');
      if (chevron) {
        chevron.textContent = btn.classList.contains('expanded') ? '▼' : '▶';
      }
    };

    // === Render Academic ===
    function renderAcademic(manifest, trends) {
      const container = document.getElementById('academic-content');
      const reports = (manifest?.academic) || [];

      if (reports.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无学术日报</div>';
        return;
      }

      const latest = reports[0];
      const latestDate = latest.date;
      const todayReports = reports.filter(r => r.date === latestDate);

      // Topic columns with word cloud toggle
      let topicColumns = '';
      if (trends) {
        const ghTopics = (trends.top_github_topics || []).slice(0, 10);
        const subscriptions = (trends.top_subscriptions || []).slice(0, 10);
        const communities = (trends.top_topics || []).slice(0, 12);
        const allTopics = [...communities, ...ghTopics, ...subscriptions].slice(0, 20);

        const renderTopicBars = (items) => {
          if (!items.length) return '<p style="color:var(--text-muted);font-size:0.875rem;">暂无数据</p>';
          const max = Math.max(...items.map(t => t.count));
          return items.map(t => {
            const pct = (t.count / max * 100).toFixed(0);
            const labelText = t.topic || t.subscription || t.category;
          return `
              <div class="bar-item has-tooltip" data-tooltip="${labelText}: ${t.count}" tabindex="0">
                <span class="bar-label has-tooltip-left" data-tooltip="${labelText}" tabindex="0">${labelText}</span>
                <div class="bar-track">
                  <div class="bar-fill academic has-tooltip" data-tooltip="${t.count}" style="width: ${pct}%" tabindex="0"></div>
                </div>
                <span class="bar-value">${t.count}</span>
              </div>
            `;
          }).join('');
        };

        topicColumns = `
          <div class="mt-24">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
              <h3 class="section-title">🔥 热门趋势</h3>
              <div class="word-cloud-toggle">
                <button class="active" onclick="switchTopicView('bars')">柱状图</button>
                <button onclick="switchTopicView('cloud')">词云图</button>
              </div>
            </div>
            <div id="topic-view-bars">
              <div class="topic-grid">
                <div class="topic-column">
                  <h3>GitHub 热门</h3>
                  <div class="bar-chart">${renderTopicBars(ghTopics)}</div>
                </div>
                <div class="topic-column">
                  <h3>arXiv 订阅</h3>
                  <div class="bar-chart">${renderTopicBars(subscriptions)}</div>
                </div>
                <div class="topic-column">
                  <h3>社区话题</h3>
                  <div class="bar-chart">${renderTopicBars(communities)}</div>
                </div>
              </div>
            </div>
            <div id="topic-view-cloud" style="display:none;">
              <div class="card">
                <div id="word-cloud-container"></div>
              </div>
            </div>
          </div>
        `;

        // Render word cloud after DOM insertion
        setTimeout(() => {
          renderWordCloud('word-cloud-container', allTopics);
        }, 0);
      }

      container.innerHTML = `
        <div class="latest-card academic">
          <div class="latest-label">最新日报 · ${latestDate}</div>
          <div class="latest-title">Heimdall 学术情报流</div>
          <div class="latest-date">今日已生成 ${todayReports.length} 份报告</div>
          <div class="section-nav">
            ${todayReports.map(r => `<a href="${r.path}">${periodLabel(r.period)}</a>`).join('')}
          </div>
          <a href="academic/" class="latest-link">浏览全部学术日报 →</a>
        </div>

        ${createCollapsibleUpdates('ac-updates', '📋 最近更新', reports, 'academic')}

        <div class="mt-24">
          <h3 class="section-title">📅 活跃度日历</h3>
          <div id="academic-calendar"></div>
        </div>

        <div class="mt-24">
          <h3 class="section-title">📈 话题趋势（近${trends?.daily_series?.length || 0}日）</h3>
          <div id="academic-sparklines"></div>
        </div>

        ${topicColumns}

        <div class="mt-24">
          <h3 class="section-title">🔗 跨订阅共振</h3>
          <div id="academic-upset"></div>
        </div>
      `;

      // Render new visualizations
      setTimeout(() => {
        renderCalendarHeatmap('academic-calendar', trends?.calendar_data || [], 'academic');
        renderSparklineArray('academic-sparklines', trends?.sparkline_data || []);
        renderUpSetPlot('academic-upset', trends?.upset_data || []);
      }, 0);

      updateResponsiveGrid('ac-updates');
    }

    // === Render Finance ===
    function renderFinance(manifest, trends) {
      const container = document.getElementById('finance-content');
      const reports = (manifest?.macro_finance) || [];

      if (reports.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无金融日报</div>';
        return;
      }

      const latest = reports[0];
      const latestDate = latest.date;
      const todayReports = reports.filter(r => r.date === latestDate);

      // Index cards
      let indexCards = '';
      const latestDay = trends?.daily_series?.[trends.daily_series.length - 1];
      if (latestDay?.indices) {
        const indices = latestDay.indices;
        const cards = Object.entries(indices).map(([name, data]) => {
          const change = data.change || 0;
          const cls = change >= 0 ? 'up' : 'down';
          const sign = change >= 0 ? '+' : '';
          return `
            <div class="index-card">
              <div class="index-name">${name}</div>
              <div class="index-value">${data.value?.toLocaleString?.() || data.value}</div>
              <div class="index-change ${cls}">${sign}${change}%</div>
            </div>
          `;
        }).join('');
        indexCards = `<div class="index-grid">${cards}</div>`;
      }

      // Line charts
      let sentimentChart = '';
      let confidenceChart = '';
      if (trends?.daily_series?.length) {
        const series = trends.daily_series;
        const labels = series.map(d => d.date);

        // Sentiment line chart
        sentimentChart = `
          <div class="line-chart-container">
            <h3>市场情绪趋势（近${series.length}日）</h3>
            <div id="sentiment-chart"></div>
            <div class="chart-legend">
              <div class="chart-legend-item">
                <div class="chart-legend-dot" style="background:var(--accent-finance)"></div>
                <span>情绪评分 (0-100)</span>
              </div>
            </div>
          </div>
        `;

        // Confidence line chart
        confidenceChart = `
          <div class="line-chart-container mt-16">
            <h3>分析置信度趋势（近${series.length}日）</h3>
            <div id="confidence-chart"></div>
            <div class="chart-legend">
              <div class="chart-legend-item">
                <div class="chart-legend-dot" style="background:var(--accent-academic)"></div>
                <span>置信度 (0-1)</span>
              </div>
            </div>
          </div>
        `;

        // Render after DOM insertion
        setTimeout(() => {
          renderLineChart('sentiment-chart', [series.map(d => d.sentiment || 0)], labels, ['var(--accent-finance)']);
          renderLineChart('confidence-chart', [series.map(d => (d.confidence || 0) * 100)], labels, ['var(--accent-academic)']);
        }, 0);
      }

      // Trend signals
      let signalChart = '';
      if (trends?.top_trend_signals?.length) {
        const maxCount = Math.max(...trends.top_trend_signals.map(t => t.count));
        const bars = trends.top_trend_signals.slice(0, 6).map(t => {
          const pct = (t.count / maxCount * 100).toFixed(0);
          return `
            <div class="bar-item has-tooltip" data-tooltip="${t.topic}: ${t.count}" tabindex="0">
              <span class="bar-label has-tooltip-left" data-tooltip="${t.topic}" tabindex="0">${t.topic}</span>
              <div class="bar-track">
                <div class="bar-fill finance has-tooltip" data-tooltip="${t.count}" style="width: ${pct}%" tabindex="0"></div>
              </div>
              <span class="bar-value">${t.count}</span>
            </div>
          `;
        }).join('');
        signalChart = `
          <div class="mt-24">
            <h3 class="section-title">宏观信号热度</h3>
            <div class="bar-chart">${bars}</div>
          </div>
        `;
      }

      container.innerHTML = `
        <div class="latest-card finance">
          <div class="latest-label">最新日报 · ${latestDate}</div>
          <div class="latest-title">Friday 宏观金融情报</div>
          <div class="latest-date">今日已生成 ${todayReports.length} 份报告</div>
          <div class="section-nav">
            ${todayReports.map(r => `<a href="${r.path}">${periodLabel(r.period)}</a>`).join('')}
          </div>
          <a href="macro-finance/" class="latest-link">浏览全部金融日报 →</a>
        </div>

        ${indexCards}

        ${createCollapsibleUpdates('fin-updates', '📋 最近更新', reports, 'finance')}

        <div class="mt-24">
          <h3 class="section-title">📅 情绪日历</h3>
          <div id="finance-calendar"></div>
        </div>

        ${sentimentChart}
        ${confidenceChart}

        <div class="mt-24">
          <h3 class="section-title">🚨 风险矩阵</h3>
          <div class="risk-matrix-container" id="finance-risk-matrix"></div>
        </div>

        ${signalChart}
      `;

      // Render new visualizations
      setTimeout(() => {
        renderCalendarHeatmap('finance-calendar', trends?.calendar_data || [], 'finance');
        renderRiskMatrix('finance-risk-matrix', trends?.risk_grid || []);
      }, 0);

      updateResponsiveGrid('fin-updates');
    }

    // === Responsive Updates Grid ===
    function updateResponsiveGrid(id) {
      const grid = document.querySelector(`#${id} .updates-grid`);
      if (!grid) return;
      const isMobile = window.innerWidth < 768;
      const section = grid.dataset.section;
      const reports = section === 'academic'
        ? (window._academicReports || [])
        : (window._financeReports || []);
      grid.innerHTML = renderUpdatesList(reports, section, isMobile ? 5 : 10);
    }

    window.addEventListener('resize', () => {
      updateResponsiveGrid('ac-updates');
      updateResponsiveGrid('fin-updates');
    });

    // Store reports for responsive updates
    let _manifest, _acTrends, _finTrends;
    async function loadDataWithStore() {
      [_manifest, _acTrends, _finTrends] = await Promise.all([
        fetch('data/manifest.json').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch('data/trends-academic.json').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch('data/trends-finance.json').then(r => r.ok ? r.json() : null).catch(() => null),
      ]);
      window._academicReports = (_manifest?.academic) || [];
      window._financeReports = (_manifest?.macro_finance) || [];
      renderAcademic(_manifest, _acTrends);
      renderFinance(_manifest, _finTrends);
    }

    loadDataWithStore();

    // Mobile: tap outside tooltip to dismiss
    document.addEventListener('touchstart', (e) => {
      const tooltipEl = e.target.closest('.has-tooltip, .has-tooltip-left');
      if (!tooltipEl) {
        document.querySelectorAll('.has-tooltip:focus, .has-tooltip-left:focus').forEach(el => el.blur());
      }
    }, { passive: true });
  </script>
</body>
</html>
